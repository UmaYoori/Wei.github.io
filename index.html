<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAITAKU HELIOS SHRINE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="star-field"></div>

    <div class="music-controls">
    <button id="bgm-toggle" onclick="toggleBGM()">🎵 MUSIC: OFF</button>
</div>

<audio id="helios-bgm" loop>
    <source src="helios-theme.mp3" type="audio/mpeg">
</audio>

    <div class="shrine-container">
        <h1 class="neon-text">☆ DAITAKU HELIOS ☆</h1>
        
        <div class="char-box">
            <img src="Daitaku_Helios_Chibi1-2.webp" alt="Helios" id="helios-img" class="floating">
        </div>

        <div class="counter-box">
    <p>TOTAL VIBES GENERATED:</p>
    <span id="count-number" class="neon-text-small">LOADING...</span>
        </div>
        
    <button class="vibe-button" onclick="playVoice()">WEIIIIII!!</button>
        
        <p class="slang">"ZUNDOKO VIBES ONLY!"</p>
    </div>

    <script>
        function playVoice() {
    const audio = new Audio('helios-voice.mp3');
    const img = document.getElementById('helios-img');
    
    // Play sound
    audio.play();

    // Trigger the shake animation
    img.classList.add('shake');
    
    // Remove the class after animation finishes so it can be re-triggered
    setTimeout(() => {
        img.classList.remove('shake');
    }, 500);

    // Bonus: Flash the background color for a split second!
    document.body.style.backgroundColor = "#444";
    setTimeout(() => { document.body.style.backgroundColor = "#1a1a1a"; }, 100);
}

        const emojis = ['✨', '🎵', '⭐', '🎧', '🔥', '💃'];

function spawnEmoji() {
    const emoji = document.createElement('div');
    emoji.className = 'floating-item';
    emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
    
    // Random horizontal position
    emoji.style.left = Math.random() * 100 + "vw";
    
    document.body.appendChild(emoji);

    // Remove it from the DOM after animation finishes
    setTimeout(() => {
        emoji.remove();
    }, 5000);
}

// Update your existing playVoice function to call this!
function playVoice() {
    // ... your existing audio and shake code ...
    spawnEmoji(); 
    spawnEmoji(); // Spawn two for extra hype!
}
        const NAMESPACE = "helios-shrine-unique-id"; // Change this to something unique!
const KEY = "wayyy-clicks";

// 1. Fetch the current count when the page opens
async function updateDisplay() {
    const response = await fetch(`https://api.countapi.xyz/get/${NAMESPACE}/${KEY}`);
    const data = await response.json();
    document.getElementById('count-number').innerText = data.value || 0;
}

// 2. Increment the count when clicking the button
async function hitCounter() {
    const response = await fetch(`https://api.countapi.xyz/hit/${NAMESPACE}/${KEY}`);
    const data = await response.json();
    document.getElementById('count-number').innerText = data.value;
}

// Update your main function
function playVoice() {
    // ... your existing audio and emoji code ...
    hitCounter(); 
}

// Run on load
updateDisplay();
        const bgm = document.getElementById('helios-bgm');
const bgmBtn = document.getElementById('bgm-toggle');

function toggleBGM() {
    if (bgm.paused) {
        bgm.play();
        bgm.volume = 0.3; // Keep it at 30% so it doesn't drown out the "WAYYY!"
        bgmBtn.innerText = "🎵 MUSIC: ON";
        bgmBtn.classList.add('playing');
    } else {
        bgm.pause();
        bgmBtn.innerText = "🎵 MUSIC: OFF";
        bgmBtn.classList.remove('playing');
    }
}

// 1. Generate the stars
const starField = document.getElementById('star-field');
for (let i = 0; i < 50; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    
    // Randomize size and position
    const size = Math.random() * 3 + 'px';
    star.style.width = size;
    star.style.height = size;
    star.style.left = Math.random() * 100 + 'vw';
    
    // Randomize start delay so they don't all move at once
    star.style.animationDelay = Math.random() * 10 + 's';
    
    starField.appendChild(star);
}

// 2. Update your toggleBGM function to include the speed change
function toggleBGM() {
    if (bgm.paused) {
        bgm.play();
        bgmBtn.innerText = "🎵 MUSIC: ON";
        // WARP SPEED!
        document.documentElement.style.setProperty('--speed', '1s');
    } else {
        bgm.pause();
        bgmBtn.innerText = "🎵 MUSIC: OFF";
        // Slow drift...
        document.documentElement.style.setProperty('--speed', '10s');
    }
}

        function playVoice() {
    const audio = new Audio('helios-voice.mp3');
    const img = document.getElementById('helios-img');
    const body = document.body;

    audio.play();
    hitCounter(); // From the previous step
    spawnEmoji(); // From the previous step

    // Shake the image
    img.classList.add('shake');
    
    // THE FLASH: Add the flash class to the body
    body.classList.add('party-flash');

    // Clean up classes after animation
    setTimeout(() => {
        img.classList.remove('shake');
        body.classList.remove('party-flash');
    }, 100); 
}
        let raveInterval;

function toggleBGM() {
    if (bgm.paused) {
        bgm.play();
        bgmBtn.innerText = "🎵 MUSIC: ON";
        document.documentElement.style.setProperty('--speed', '1s');
        
        // Start auto-flashing every 500ms (adjust to match your song's BPM!)
        raveInterval = setInterval(() => {
            document.body.classList.add('party-flash');
            setTimeout(() => document.body.classList.remove('party-flash'), 100);
        }, 500);

    } else {
        bgm.pause();
        bgmBtn.innerText = "🎵 MUSIC: OFF";
        document.documentElement.style.setProperty('--speed', '10s');
        
        // Stop the flashing
        clearInterval(raveInterval);
    }
}


    </script>
</body>
</html>
