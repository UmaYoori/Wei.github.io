<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DAITAKU HELIOS SHRINE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-screen">
        <div class="loader-content">
            <h2 class="neon-text-small">LOADING VIBES...</h2>
            <div class="progress-bar-container"><div id="progress-bar"></div></div>
        </div>
    </div>

    <div id="star-field"></div>

    <div class="music-controls">
        <button id="bgm-toggle" onclick="toggleBGM()">🎵 MUSIC: OFF</button>
    </div>

    <div class="shrine-container">
        <h1 class="neon-text">☆ DAITAKU HELIOS ☆</h1>
        <div class="char-box">
            <img src="Daitaku_Helios_Chibi1-2.webp" alt="Helios" id="helios-img" class="floating">
        </div>
        
        <div class="counter-box">
            <p>GLOBAL VIBES:</p>
            <span id="count-number" class="neon-text-small">0</span>
            <p style="margin-top: 10px; font-size: 0.8rem;">YOUR CONTRIBUTION: <span id="personal-count">0</span></p>
        </div>
        
        <button class="vibe-button" onclick="playVoice()">WEIIIIII!!</button>
        
        <div class="share-container">
            <button class="share-btn" onclick="shareVibes()">SHARE YOUR VIBES 𝕏</button>
        </div>
    </div>

    <button id="info-btn" onclick="openModal()">?</button>

    <div id="helios-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 class="neon-text-small">WHO IS HELIOS?</h2>
            <p>The "Party Gal" of the turf! MAXIMUM ZUNDOKO.</p>
        </div>
    </div>

    <script>
        const bgm = new Audio('helios-theme.mp3'); 
        bgm.loop = true;
        const bgmBtn = document.getElementById('bgm-toggle');
        const emojis = ['✨', '🎵', '⭐', '🎧', '🔥', '💃'];
        const COUNTER_URL = "https://find-it.mojocounter.com/hits?id=helios-shrine-wei";
        let raveInterval;
        let milestonesReached = { 100: false, 500: false, 1000: false };

        // --- Personal High Score Logic ---
        let personalClicks = parseInt(localStorage.getItem('helios_personal_clicks')) || 0;
        document.getElementById('personal-count').innerText = personalClicks.toLocaleString();

        window.addEventListener('load', () => {
            const loader = document.getElementById('loading-screen');
            setTimeout(() => {
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => { loader.style.display = 'none'; }, 500);
                }
            }, 1000);
        });

        async function updateDisplay() {
            try {
                const response = await fetch(COUNTER_URL);
                const data = await response.json();
                document.getElementById('count-number').innerText = data.value.toLocaleString();
            } catch (e) { document.getElementById('count-number').innerText = "VIBIN'"; }
        }
        updateDisplay();

        async function playVoice() {
            const audio = new Audio('helios-voice.mp3');
            const img = document.getElementById('helios-img');
            audio.play().catch(e => {});
            
            // Visuals
            img.classList.add('shake');
            document.body.classList.add('party-flash');
            spawnEmoji();

            // Personal Counter
            personalClicks++;
            localStorage.setItem('helios_personal_clicks', personalClicks);
            document.getElementById('personal-count').innerText = personalClicks.toLocaleString();

            // Global Counter
            try {
                const response = await fetch(COUNTER_URL + "&increment=true");
                const data = await response.json();
                document.getElementById('count-number').innerText = data.value.toLocaleString();
                checkMilestones(data.value);
            } catch (e) {}

            setTimeout(() => {
                img.classList.remove('shake');
                document.body.classList.remove('party-flash');
            }, 100);
        }

        function checkMilestones(count) {
            [100, 500, 1000].forEach(m => {
                if (count >= m && !milestonesReached[m]) {
                    milestonesReached[m] = true;
                    alert(`🌟 GLOBAL RAVE! ${m} VIBES REACHED! 🌟`);
                }
            });
        }

        function toggleBGM() {
            if (bgm.paused) {
                bgm.play().then(() => {
                    bgm.volume = 0.3;
                    bgmBtn.innerText = "🎵 MUSIC: ON";
                    bgmBtn.classList.add('playing');
                    raveInterval = setInterval(() => {
                        document.body.classList.add('party-flash');
                        setTimeout(() => document.body.classList.remove('party-flash'), 100);
                    }, 500);
                });
            } else {
                bgm.pause();
                bgmBtn.innerText = "🎵 MUSIC: OFF";
                bgmBtn.classList.remove('playing');
                clearInterval(raveInterval);
            }
        }

        function spawnEmoji() {
            const emoji = document.createElement('div');
            emoji.className = 'floating-item';
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(emoji);
            setTimeout(() => emoji.remove(), 5000);
        }

        const starField = document.getElementById('star-field');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDelay = Math.random() * 10 + 's';
            if(starField) starField.appendChild(star);
        }

        function openModal() { document.getElementById("helios-modal").style.display = "block"; }
        function closeModal() { document.getElementById("helios-modal").style.display = "none"; }
        function shareVibes() {
            const tweetText = `I've contributed ${personalClicks} vibes to the Daitaku Helios Shrine! 🌟`;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(tweetText)}&url=${encodeURIComponent(window.location.href)}`, '_blank');
        }
    </script>
</body>
</html>
