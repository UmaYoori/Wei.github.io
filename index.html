<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HELIOS SHRINE | WEIIIIII!!</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <a href=https://umayoori.github.io/Wei.github.io/" style="position: fixed; top: 15px; left: 15px; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.8rem; z-index: 1000; font-family: sans-serif;">← BACK TO HOME</a>

    <div id="notification-toast">🌟 MILESTONE! 🌟</div>
    <div id="star-field"></div>

    <div class="shrine-container">
        <div class="music-controls">
            <button id="bgm-toggle" onclick="toggleBGM()">🎵 MUSIC: OFF</button>
        </div>

        <h1 class="neon-text">☆ DAITAKU HELIOS ☆</h1>

        <div class="char-box">
            <img src="Daitaku_Helios_Chibi1-2.webp" alt="Helios" id="helios-img" class="floating">
        </div>

        <div class="counter-box">
            <p style="font-size: 0.9rem; margin-bottom: 5px;">YOUR TOTAL VIBES:</p>
            <span id="personal-count" class="neon-text-small">0</span>
            <br>
            <button class="reset-btn" onclick="resetPersonal()">RESET COUNTER</button>
        </div>

        <button class="vibe-button" onclick="playVoice()">WEIIIIII!!</button>

        <button class="share-btn" style="background:transparent; border:none; color:#1DA1F2; font-size:0.8rem; cursor:pointer; margin-top:10px;" onclick="shareVibes()">SHARE 𝕏</button>
    </div>

    <script>
    const bgm = new Audio('helios-theme.mp3');
    const milestoneAudio = new Audio('milestone.mp3');
    bgm.loop = true;
    const emojis = ['✨', '🎵', '⭐', '🎧', '🔥'];
    let milestonesReached = { 100: false, 500: false, 1000: false, 5000: false };

    let personalClicks = parseInt(localStorage.getItem('helios_personal_clicks')) || 0;
    document.getElementById('personal-count').innerText = personalClicks.toLocaleString();

    function playVoice() {
        new Audio('helios-voice.mp3').play().catch(()=>{});
        const img = document.getElementById('helios-img');
        img.classList.add('shake');
        document.body.classList.add('party-flash');
        spawnEmoji();

        personalClicks++;
        localStorage.setItem('helios_personal_clicks', personalClicks);
        document.getElementById('personal-count').innerText = personalClicks.toLocaleString();
        checkMilestones(personalClicks);

        setTimeout(() => { 
            img.classList.remove('shake'); 
            document.body.classList.remove('party-flash'); 
        }, 100);
    }

    function toggleBGM() {
        const root = document.documentElement;
        if (bgm.paused) {
            bgm.play().catch(() => alert("Click WEIIIIII first!"));
            document.getElementById('bgm-toggle').innerText = "🎵 MUSIC: ON";
            root.style.setProperty('--star-speed', '1.5s');
        } else {
            bgm.pause();
            document.getElementById('bgm-toggle').innerText = "🎵 MUSIC: OFF";
            root.style.setProperty('--star-speed', '8s');
        }
    }

    function resetPersonal() {
        if(confirm("Reset your vibes to zero?")) {
            personalClicks = 0;
            localStorage.setItem('helios_personal_clicks', 0);
            document.getElementById('personal-count').innerText = "0";
            milestonesReached = { 100: false, 500: false, 1000: false, 5000: false };
        }
    }

    function checkMilestones(count) {
        [100, 500, 1000, 5000].forEach(m => {
            if (count >= m && !milestonesReached[m]) {
                milestonesReached[m] = true;
                milestoneAudio.play().catch(() => {
                    // Fallback beep logic if mp3 is missing
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.setValueAtTime(880, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.2);
                });
                const toast = document.getElementById('notification-toast');
                toast.innerText = `🔥 MILESTONE: ${m} VIBES! 🔥`;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
                for(let i=0; i<15; i++) setTimeout(spawnEmoji, i * 100);
            }
        });
    }

    function spawnEmoji() {
        const e = document.createElement('div');
        e.className = 'floating-item';
        e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        e.style.left = Math.random() * 90 + "vw";
        document.body.appendChild(e);
        setTimeout(() => e.remove(), 4000);
    }

    const starField = document.getElementById('star-field');
    for (let i = 0; i < 40; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + 'vw';
        s.style.animationDelay = Math.random() * -10 + 's';
        starField.appendChild(s);
    }

    function shareVibes() {
        const text = `I have offered ${personalClicks} vibes at the Daitaku Helios Shrine! 🌟`;
        window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(window.location.href)}`);
    }
</script>
</body>
</html>
