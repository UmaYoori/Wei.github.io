<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAITAKU HELIOS SHRINE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="star-field"></div>

    <div class="music-controls">
    <button id="bgm-toggle" onclick="toggleBGM()">🎵 MUSIC: OFF</button>
</div>

<audio id="helios-bgm" loop>
    <source src="helios-theme.mp3" type="audio/mpeg">
</audio>
<div class="share-container">
    <button class="share-btn" onclick="shareVibes()">SHARE YOUR VIBES 𝕏</button>
</div>

    <div class="shrine-container">
        <h1 class="neon-text">☆ DAITAKU HELIOS ☆</h1>
        
        <div class="char-box">
            <img src="Daitaku_Helios_Chibi1-2.webp" alt="Helios" id="helios-img" class="floating">
        </div>

        <div class="counter-box">
    <p>TOTAL VIBES GENERATED:</p>
    <span id="count-number" class="neon-text-small">LOADING...</span>
        </div>
        
    <button class="vibe-button" onclick="playVoice()">WEIIIIII!!</button>
        
        <p class="slang">"ZUNDOKO VIBES ONLY!"</p>
    </div>

    <script>
        const NAMESPACE = "helios-shrine-unique-id"; 
const KEY = "wayyy-clicks";
const bgm = document.getElementById('helios-bgm');
const bgmBtn = document.getElementById('bgm-toggle');
const emojis = ['✨', '🎵', '⭐', '🎧', '🔥', '💃'];
let raveInterval;

// --- 1. INITIALIZE ---
async function updateDisplay() {
    try {
        const response = await fetch(`https://api.countapi.xyz/get/${NAMESPACE}/${KEY}`);
        const data = await response.json();
        document.getElementById('count-number').innerText = data.value || 0;
    } catch (e) { document.getElementById('count-number').innerText = "VIBIN'"; }
}
updateDisplay();

// --- 2. THE MAIN "WAYYY" ACTION ---
async function playVoice() {
    // Audio & Visuals
    const audio = new Audio('helios-voice.mp3');
    const img = document.getElementById('helios-img');
    audio.play();
    
    // Effects
    img.classList.add('shake');
    document.body.classList.add('party-flash');
    spawnEmoji();
    spawnEmoji();

    // Counter Update
    try {
        const response = await fetch(`https://api.countapi.xyz/hit/${NAMESPACE}/${KEY}`);
        const data = await response.json();
        document.getElementById('count-number').innerText = data.value;
    } catch (e) { console.log("Counter offline"); }

    setTimeout(() => {
        img.classList.remove('shake');
        document.body.classList.remove('party-flash');
    }, 100);
}

// --- 3. BGM & RAVE MODE ---
function toggleBGM() {
    if (bgm.paused) {
        bgm.play();
        bgm.volume = 0.3;
        bgmBtn.innerText = "🎵 MUSIC: ON";
        bgmBtn.classList.add('playing');
        document.documentElement.style.setProperty('--speed', '1s');
        
        raveInterval = setInterval(() => {
            document.body.classList.add('party-flash');
            setTimeout(() => document.body.classList.remove('party-flash'), 100);
        }, 500);
    } else {
        bgm.pause();
        bgmBtn.innerText = "🎵 MUSIC: OFF";
        bgmBtn.classList.remove('playing');
        document.documentElement.style.setProperty('--speed', '10s');
        clearInterval(raveInterval);
    }
}

// --- 4. EXTRAS (EMOJIS, STARS, MODAL, SHARE) ---
function spawnEmoji() {
    const emoji = document.createElement('div');
    emoji.className = 'floating-item';
    emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
    emoji.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(emoji);
    setTimeout(() => emoji.remove(), 5000);
}

// Generate background stars
const starField = document.getElementById('star-field');
for (let i = 0; i < 50; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 3 + 'px';
    star.style.width = size; star.style.height = size;
    star.style.left = Math.random() * 100 + 'vw';
    star.style.animationDelay = Math.random() * 10 + 's';
    starField.appendChild(star);
}

function openModal() { document.getElementById("helios-modal").style.display = "block"; }
function closeModal() { document.getElementById("helios-modal").style.display = "none"; }

function shareVibes() {
    const count = document.getElementById('count-number').innerText;
    const tweetText = `I just generated ${count} vibes for Daitaku Helios! 🌟 WAYYYY!!`;
    const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(tweetText)}&url=${encodeURIComponent(window.location.href)}`;
    window.open(twitterUrl, '_blank');
}

// Global click listener for modal
window.onclick = (e) => { if (e.target.className == 'modal') closeModal(); }


    </script>
    <button id="info-btn" onclick="openModal()">?</button>

<div id="helios-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 class="neon-text-small">WHO IS HELIOS?</h2>
        <p>She's the "Party Gal" of the turf! Known for her high energy, Eurobeat vibes, and legendary slang.</p>
        <hr>
        <p>Vibe Status: <strong>MAXIMUM ZUNDOKO</strong></p>
        <p style="font-size: 0.8rem;">Created for the culture.</p>
    </div>
</div>

</body>
</html>
