<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAITAKU HELIOS SHRINE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="shrine-container">
        <h1 class="neon-text">☆ DAITAKU HELIOS ☆</h1>
        
        <div class="char-box">
            <img src="Daitaku_Helios_Chibi1-2.webp" alt="Helios" id="helios-img" class="floating">
        </div>

        <button class="vibe-button" onclick="playVoice()">WEIIIIII!!</button>
        
        <p class="slang">"ZUNDOKO VIBES ONLY!"</p>
    </div>

    <script>
        function playVoice() {
    const audio = new Audio('helios-voice.mp3');
    const img = document.getElementById('helios-img');
    
    // Play sound
    audio.play();

    // Trigger the shake animation
    img.classList.add('shake');
    
    // Remove the class after animation finishes so it can be re-triggered
    setTimeout(() => {
        img.classList.remove('shake');
    }, 500);

    // Bonus: Flash the background color for a split second!
    document.body.style.backgroundColor = "#444";
    setTimeout(() => { document.body.style.backgroundColor = "#1a1a1a"; }, 100);
}

    </script>
</body>
</html>
