<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HELIOS SHRINE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="notification-toast">🌟 MILESTONE! 🌟</div>
    <div id="star-field"></div>

    <div class="shrine-container">
        <div class="music-controls">
            <button id="bgm-toggle" onclick="toggleBGM()">🎵 MUSIC: OFF</button>
        </div>

        <h1 class="neon-text">☆ DAITAKU HELIOS ☆</h1>

        <div class="char-box">
            <img src="Daitaku_Helios_Chibi1-2.webp" alt="Helios" id="helios-img" class="floating">
        </div>

        <div class="counter-box">
            <p style="font-size: 0.8rem;">GLOBAL VIBES:</p>
            <span id="count-number" class="neon-text-small">0</span>
            <p style="font-size: 0.7rem; color: #aaa; margin-top: 5px;">
                YOURS: <span id="personal-count" style="color: #00ffff;">0</span>
                <button class="reset-btn" onclick="resetPersonal()">RESET</button>
            </p>
        </div>

        <button class="vibe-button" onclick="playVoice()">WEIIIIII!!</button>

        <button class="share-btn" style="background:transparent; border:none; color:#1DA1F2; font-size:0.8rem; cursor:pointer;" onclick="shareVibes()">SHARE 𝕏</button>
    </div>

    <script>
        const bgm = new Audio('helios-theme.mp3');
        bgm.loop = true;
        const emojis = ['✨', '🎵', '⭐', '🎧', '🔥'];
        const BASE_URL = "https://find-it.mojocounter.com/hits?id=helios-shrine-wei";
        let milestonesReached = { 100: false, 500: false, 1000: false };

        let personalClicks = parseInt(localStorage.getItem('helios_personal_clicks')) || 0;
        document.getElementById('personal-count').innerText = personalClicks.toLocaleString();

        async function updateDisplay() {
            try {
                const res = await fetch(`${BASE_URL}&t=${Date.now()}`);
                const data = await res.json();
                if(data.value !== undefined) {
                    document.getElementById('count-number').innerText = data.value.toLocaleString();
                    checkMilestones(data.value);
                }
            } catch (e) {}
        }
        updateDisplay();

        function playVoice() {
            new Audio('helios-voice.mp3').play().catch(()=>{});
            const img = document.getElementById('helios-img');
            img.classList.add('shake');
            document.body.classList.add('party-flash');
            spawnEmoji();

            personalClicks++;
            localStorage.setItem('helios_personal_clicks', personalClicks);
            document.getElementById('personal-count').innerText = personalClicks.toLocaleString();

            // The "Image Ping" Trick: Bypasses CORS and security blocks
            const ping = new Image();
            ping.src = `${BASE_URL}&increment=true&t=${Date.now()}`;
            
            // Refresh number after a tiny delay
            setTimeout(updateDisplay, 800);
            
            setTimeout(() => { 
                img.classList.remove('shake'); 
                document.body.classList.remove('party-flash'); 
            }, 100);
        }

        function resetPersonal() {
            if(confirm("Reset your personal vibe count?")) {
                personalClicks = 0;
                localStorage.setItem('helios_personal_clicks', 0);
                document.getElementById('personal-count').innerText = "0";
            }
        }

        function checkMilestones(count) {
            [100, 500, 1000].forEach(m => {
                if (count >= m && !milestonesReached[m]) {
                    milestonesReached[m] = true;
                    const toast = document.getElementById('notification-toast');
                    toast.innerText = `🔥 GLOBAL RAVE: ${m}! 🔥`;
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 3000);
                }
            });
        }

        function toggleBGM() {
            if (bgm.paused) {
                bgm.play().catch(() => alert("Click WEIIIIII first!"));
                document.getElementById('bgm-toggle').innerText = "🎵 MUSIC: ON";
            } else {
                bgm.pause();
                document.getElementById('bgm-toggle').innerText = "🎵 MUSIC: OFF";
            }
        }

        function spawnEmoji() {
            const e = document.createElement('div');
            e.className = 'floating-item';
            e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            e.style.left = Math.random() * 90 + "vw";
            document.body.appendChild(e);
            setTimeout(() => e.remove(), 4000);
        }

        const starField = document.getElementById('star-field');
        for (let i = 0; i < 40; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDuration = `${Math.random() * 8 + 4}s, 3s`;
            s.style.animationDelay = Math.random() * -10 + 's';
            starField.appendChild(s);
        }

        function shareVibes() {
            window.open(`https://twitter.com/intent/tweet?text=I contributed ${personalClicks} vibes to the Daitaku Helios Shrine! 🌟&url=${window.location.href}`);
        }
    </script>
</body>
</html>
